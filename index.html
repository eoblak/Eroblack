<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loto Klasik</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #app { width: 100%; max-width: 350px; padding: 15px; background: #1a1a1a; border-radius: 15px; text-align: center; }
        
        canvas { background: radial-gradient(circle, #222, #000); border-radius: 50%; border: 3px solid #333; width: 220px; height: 220px; }

        .prize-slots { display: flex; justify-content: center; gap: 15px; margin: 15px 0; min-height: 50px; }
        .slot { width: 50px; height: 50px; border: 2px dashed #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; position: relative; }
        .slot-label { position: absolute; top: -15px; font-size: 9px; color: #aaa; width: 100%; }

        .input-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .field { display: flex; flex-direction: column; align-items: flex-start; }
        label { font-size: 10px; color: #888; margin-bottom: 3px; text-transform: uppercase; }
        
        input { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; font-size: 16px; font-weight: bold; text-align: center; }
        input:focus { border-color: #ff4d4d; outline: none; }

        button { width: 100%; background: #cc0000; color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; }
        button:active { background: #ff0000; }

        /* Modal Rezilta */
        #result-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .modal-box { background: #222; padding: 25px; border-radius: 20px; border: 2px solid #cc0000; width: 80%; text-align: center; }
    </style>
</head>
<body>

    <div id="app">
        <canvas id="lotoCanvas" width="300" height="300"></canvas>
        
        <div class="prize-slots">
            <div class="slot" id="slot-0"><span class="slot-label">1ye Lò</span></div>
            <div class="slot" id="slot-1"><span class="slot-label">2yèm Lò</span></div>
            <div class="slot" id="slot-2"><span class="slot-label">3yèm Lò</span></div>
        </div>

        <div class="field">
            <label>Mete 3 boul ou yo</label>
            <input type="text" id="my-numbers" inputmode="numeric" placeholder="00 00 00" maxlength="8">
        </div>

        <div class="input-area">
            <div class="field">
                <label>Miz (Goud)</label>
                <input type="number" id="bet-input" value="20">
            </div>
            <div class="field">
                <label>Peye</label>
                <input type="text" id="txt-peye" value="0" readonly>
            </div>
        </div>

        <div class="field" style="margin-top:10px;">
            <label>W ap genyen</label>
            <input type="text" id="txt-genyen" value="0" readonly style="color:#00ff00;">
        </div>

        <button id="btn-start">DEMARE TIRAJ</button>
    </div>

    <div id="result-modal">
        <div class="modal-box" id="modal-content"></div>
    </div>

<script>
    const canvas = document.getElementById('lotoCanvas');
    const ctx = canvas.getContext('2d');
    const btnStart = document.getElementById('btn-start');
    const myNumbersInput = document.getElementById('my-numbers');
    const betInput = document.getElementById('bet-input');
    const txtPeye = document.getElementById('txt-peye');
    const txtGenyen = document.getElementById('txt-genyen');

    let balls = [];
    let isShaking = false;
    let drawnNumbers = [];
    const globe = { x: 150, y: 150, radius: 140 };

    // Auto-spacing pou 3 boul
    myNumbersInput.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        let res = "";
        for(let i=0; i<v.length && i<6; i++) {
            if(i>0 && i%2===0) res += " ";
            res += v[i];
        }
        e.target.value = res;
    });

    class Ball {
        constructor(n) {
            this.num = n < 10 ? '0'+n : ''+n;
            this.radius = 12;
            this.color = `hsl(${Math.random()*360}, 70%, 50%)`;
            this.reset();
        }
        reset() {
            this.x = globe.x + (Math.random()-0.5)*150;
            this.y = globe.y + (Math.random()-0.5)*150;
            this.vx = (Math.random()-0.5)*12;
            this.vy = (Math.random()-0.5)*12;
            this.inGlobe = true;
        }
        draw() {
            if(!this.inGlobe) return;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.font = "bold 10px Arial";
            ctx.textAlign = "center";
            ctx.fillText(this.num, this.x, this.y+4);
        }
        update() {
            if(!this.inGlobe) return;
            if(isShaking) { this.vx += (Math.random()-0.5)*6; this.vy += (Math.random()-0.5)*6; }
            this.x += this.vx; this.y += this.vy;
            this.vx *= 0.98; this.vy *= 0.98;
            let dist = Math.hypot(this.x-globe.x, this.y-globe.y);
            if(dist + this.radius > globe.radius) {
                let ang = Math.atan2(this.y-globe.y, this.x-globe.x);
                this.x = globe.x + Math.cos(ang)*(globe.radius-this.radius);
                this.y = globe.y + Math.sin(ang)*(globe.radius-this.radius);
                this.vx *= -0.8; this.vy *= -0.8;
            }
        }
    }

    function init() {
        balls = [];
        for(let i=0; i<100; i++) balls.push(new Ball(i));
    }

    btnStart.onclick = () => {
        const val = myNumbersInput.value.trim();
        if(val.length < 8) { alert("Chwazi 3 boul (00 00 00)"); return; }
        
        if(confirm(`Èske ou dakò peye ${betInput.value} goud?`)) {
            txtPeye.value = betInput.value;
            komanseTiraj();
        }
    };

    function komanseTiraj() {
        btnStart.disabled = true;
        drawnNumbers = [];
        document.querySelectorAll('.slot').forEach(s => {
            const label = s.querySelector('.slot-label');
            s.innerHTML = ""; 
            s.appendChild(label);
            s.style.background = "transparent";
        });

        isShaking = true;
        setTimeout(() => {
            isShaking = false;
            tirer(0, 1000);
            tirer(1, 2500);
            tirer(2, 4000);
        }, 5000); // 5 segond brase pou l pi rapid sou mobil
    }

    function tirer(idx, delay) {
        setTimeout(() => {
            let available = balls.filter(b => b.inGlobe);
            let b = available[Math.floor(Math.random()*available.length)];
            b.inGlobe = false;
            drawnNumbers.push(b.num);
            
            let slot = document.getElementById(`slot-${idx}`);
            slot.style.background = b.color;
            slot.innerHTML += b.num;

            if(drawnNumbers.length === 3) verifikasyon();
        }, delay);
    }

    function verifikasyon() {
        const bet = parseFloat(txtPeye.value);
        const mine = myNumbersInput.value.split(" ");
        let win = 0;
        let txt = "";

        if(mine.includes(drawnNumbers[0])) { win += bet*100; txt += "1ye Lò! "; }
        if(mine.includes(drawnNumbers[1])) { win += bet*50; txt += "2yèm Lò! "; }
        if(mine.includes(drawnNumbers[2])) { win += bet*25; txt += "3yèm Lò! "; }

        txtGenyen.value = win;
        
        setTimeout(() => {
            const modal = document.getElementById('result-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h1 style="color:#ffcc00">TIRAJ FINI</h1>
                <p style="font-size:20px">${drawnNumbers.join(" - ")}</p>
                <h2 style="color:#00ff00">${win > 0 ? "OU GENYEN: "+win+" HTG" : "OU PA GENYEN"}</h2>
                <button onclick="document.getElementById('result-modal').style.display='none'" style="width:100px">OK</button>
            `;
            modal.style.display = "flex";
            btnStart.disabled = false;
        }, 1000);
    }

    function loop() {
        ctx.clearRect(0,0,300,300);
        balls.forEach(b => { b.update(); b.draw(); });
        requestAnimationFrame(loop);
    }

    init();
    loop();
</script>
</body>
</html>
