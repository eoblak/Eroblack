<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loto 3 Lò - Pwofesyonèl</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        #game-container { position: relative; width: 380px; padding: 20px; background: #222; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        canvas { background: radial-gradient(circle, #333, #000); border-radius: 50%; border: 4px solid #444; margin-bottom: 10px; }
        
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        
        input { background: #333; border: 2px solid #444; border-radius: 8px; color: #fff; padding: 12px; font-size: 20px; text-align: center; font-weight: bold; outline: none; }
        input:focus { border-color: #ff4d4d; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button { background: linear-gradient(135deg, #ff4d4d, #cc0000); color: #fff; border: none; padding: 18px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 5px; box-shadow: 0 4px 15px rgba(204, 0, 0, 0.4); }
        button:active { transform: scale(0.98); }
        
        /* Custom Modal Style */
        #custom-dialog { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .dialog-box { background: #333; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 300px; border: 2px solid #ff4d4d; }
        .dialog-box h2 { color: #ffcc00; margin-top: 0; }
        .dialog-box p { font-size: 18px; line-height: 1.5; }
        .btn-close { background: #fff; color: #000; padding: 10px 20px; border-radius: 5px; margin-top: 15px; cursor: pointer; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="lotoCanvas" width="340" height="340"></canvas>
        
        <div class="input-group">
            <label>Chwazi 3 Boul (ex: 01 22 99)</label>
            <input type="text" id="my-numbers" inputmode="numeric" placeholder="00 00 00" maxlength="8">
        </div>

        <div class="row">
            <div class="input-group">
                <label>Peye (HTG)</label>
                <input type="number" id="bet-input" value="20">
            </div>
            <div class="input-group">
                <label>Lajan nan Peye</label>
                <input type="text" id="txt-peye" value="0" readonly>
            </div>
        </div>

        <div class="input-group">
            <label>Lajan ou Genyen</label>
            <input type="text" id="txt-genyen" value="0" readonly style="color: #33cc33; font-size: 24px;">
        </div>

        <button id="btn-start">DEMARE TIRAJA</button>
    </div>

    <div id="custom-dialog">
        <div class="dialog-box" id="dialog-content">
            </div>
    </div>

<script>
    const canvas = document.getElementById('lotoCanvas');
    const ctx = canvas.getContext('2d');
    const btnStart = document.getElementById('btn-start');
    const txtPeye = document.getElementById('txt-peye');
    const txtGenyen = document.getElementById('txt-genyen');
    const betInput = document.getElementById('bet-input');
    const myNumbersInput = document.getElementById('my-numbers');
    const dialog = document.getElementById('custom-dialog');
    const dialogContent = document.getElementById('dialog-content');

    let balls = [];
    let drawnBalls = [];
    let isShaking = false;
    const globe = { x: 170, y: 170, radius: 155 };
    const shelfY = 320; // Kote boul yo al poze

    // 1. Antre entelijan (Espas otomatik)
    myNumbersInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\D/g, ''); // Pran chif sèlman
        let formatted = "";
        for (let i = 0; i < val.length && i < 6; i++) {
            if (i > 0 && i % 2 === 0) formatted += " ";
            formatted += val[i];
        }
        e.target.value = formatted;
    });

    class Ball {
        constructor(num) {
            this.number = num < 10 ? '0' + num : '' + num;
            this.radius = 12;
            this.resetPosition();
            this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
            this.isDrawn = false;
            this.targetX = 0;
        }
        resetPosition() {
            this.x = globe.x + (Math.random() - 0.5) * 200;
            this.y = globe.y + (Math.random() - 0.5) * 200;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.stroke();
            ctx.fillStyle = "#000";
            ctx.font = "bold 10px Arial";
            ctx.textAlign = "center";
            ctx.fillText(this.number, this.x, this.y + 4);
        }
        update() {
            if (this.isDrawn) {
                // Animasyon pou l al poze nan ranp lan
                this.x += (this.targetX - this.x) * 0.1;
                this.y += (310 - this.y) * 0.1;
                return;
            }
            if (isShaking) {
                this.vx += (Math.random() - 0.5) * 5;
                this.vy += (Math.random() - 0.5) * 5;
            }
            this.x += this.vx; this.y += this.vy;
            this.vx *= 0.98; this.vy *= 0.98;

            let dx = this.x - globe.x, dy = this.y - globe.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist + this.radius > globe.radius) {
                let angle = Math.atan2(dy, dx);
                this.x = globe.x + Math.cos(angle) * (globe.radius - this.radius);
                this.y = globe.y + Math.sin(angle) * (globe.radius - this.radius);
                this.vx *= -0.8; this.vy *= -0.8;
            }
        }
    }

    function init() {
        balls = [];
        for (let i = 0; i < 100; i++) balls.push(new Ball(i));
    }

    btnStart.addEventListener('click', () => {
        const betValue = betInput.value;
        const myNums = myNumbersInput.value.split(" ");
        if (myNums.length < 3 || myNums[2] === "") { alert("Chwazi 3 boul tanpri!"); return; }

        if (confirm(`Èske ou dakò peye ${betValue} goud pou tiraj sa a?`)) {
            txtPeye.value = betValue; // Mete ajou otomatik
            startSequence();
        }
    });

    function startSequence() {
        btnStart.disabled = true;
        drawnBalls = [];
        txtGenyen.value = "0";
        isShaking = true;
        balls.forEach(b => { b.isDrawn = false; b.resetPosition(); });

        setTimeout(() => {
            isShaking = false;
            tirer(0, 1000); // 11e segond
            tirer(1, 2500); // 12e segond
            tirer(2, 4000); // 13e segond
        }, 10000);
    }

    function tirer(index, delay) {
        setTimeout(() => {
            let available = balls.filter(b => !b.isDrawn);
            let lucky = available[Math.floor(Math.random() * available.length)];
            lucky.isDrawn = true;
            lucky.targetX = 100 + (index * 70);
            drawnBalls.push(lucky.number);

            if (drawnBalls.length === 3) finishGame();
        }, delay);
    }

    function finishGame() {
        const bet = parseFloat(txtPeye.value);
        const myNums = myNumbersInput.value.split(" ");
        let total = 0;
        let hits = [];

        if (myNums.includes(drawnBalls[0])) { total += bet * 100; hits.push("1ye Lò"); }
        if (myNums.includes(drawnBalls[1])) { total += bet * 50; hits.push("2yèm Lò"); }
        if (myNums.includes(drawnBalls[2])) { total += bet * 25; hits.push("3yèm Lò"); }

        txtGenyen.value = total;
        
        let html = `<h2>REZILTA</h2><p style="font-size: 24px; letter-spacing: 5px;">${drawnBalls.join(" - ")}</p>`;
        if (total > 0) {
            html += `<p style="color:#33cc33">BRAVO!<br>Ou fè ${hits.join(" ak ")}<br><b>GENYEN: ${total} HTG</b></p>`;
        } else {
            html += `<p>Ou pa fè anyen fwa sa.</p>`;
        }
        html += `<div class="btn-close" onclick="closeDialog()">OK</div>`;
        
        dialogContent.innerHTML = html;
        dialog.style.display = "flex";
        btnStart.disabled = false;
    }

    window.closeDialog = () => { dialog.style.display = "none"; };

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Sèk la
        ctx.beginPath();
        ctx.arc(globe.x, globe.y, globe.radius, 0, Math.PI*2);
        ctx.strokeStyle = "#444"; ctx.lineWidth = 5; ctx.stroke();
        
        // Ranp repo
        ctx.fillStyle = "#333";
        ctx.fillRect(80, 325, 180, 5);

        balls.forEach(b => { b.update(); b.draw(); });
        requestAnimationFrame(animate);
    }

    init();
    animate();
</script>
</body>
</html>
