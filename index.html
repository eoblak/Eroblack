<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loto 3 Lò - Simulation Pwofesyonèl</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        #game-container { position: relative; width: 400px; text-align: center; }
        canvas { background: radial-gradient(circle, #1a1a1a, #000); border-radius: 50%; border: 5px solid #444; }
        .ui-panel { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        input { padding: 10px; border-radius: 5px; border: none; text-align: center; font-size: 16px; font-weight: bold; }
        .full-width { grid-column: span 2; }
        button { background: linear-gradient(135deg, #ff4d4d, #cc0000); color: #fff; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 10px; width: 100%; }
        #results { font-size: 24px; color: #ffcc00; margin: 10px 0; height: 30px; font-weight: bold; }
        label { font-size: 12px; color: #aaa; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="lotoCanvas" width="400" height="400"></canvas>
        
        <div id="results">ATANN TIRAJA...</div>

        <div class="ui-panel">
            <div style="display:flex; flex-direction:column">
                <label>6 Nimewo Chwazi (separé ak espas)</label>
                <input type="text" id="my-numbers" placeholder="ex: 01 12 45 67 89 00" class="full-width">
            </div>
            <div style="display:flex; flex-direction:column; grid-column: span 1">
                <label>Peye (HTG)</label>
                <input type="number" id="txt-peye" value="20">
            </div>
            <div style="display:flex; flex-direction:column; grid-column: span 1">
                <label>Genyen (HTG)</label>
                <input type="text" id="txt-genyen" value="0" readonly style="color: #33cc33;">
            </div>
            <button id="btn-start" class="full-width">DEMARE TIRAJA (10s)</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('lotoCanvas');
    const ctx = canvas.getContext('2d');
    const btnStart = document.getElementById('btn-start');
    const resultsDiv = document.getElementById('results');
    const txtPeye = document.getElementById('txt-peye');
    const txtGenyen = document.getElementById('txt-genyen');
    const myNumbersInput = document.getElementById('my-numbers');

    let balls = [];
    let drawnBalls = [];
    let isShaking = false;
    const globe = { x: 200, y: 200, radius: 180 };

    class Ball {
        constructor(num) {
            this.number = num < 10 ? '0' + num : '' + num;
            this.radius = 11;
            this.x = globe.x + (Math.random() - 0.5) * 200;
            this.y = globe.y + (Math.random() - 0.5) * 200;
            this.vx = (Math.random() - 0.5) * 5;
            this.vy = (Math.random() - 0.5) * 5;
            this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.fillStyle = "#000";
            ctx.font = "bold 9px Arial";
            ctx.textAlign = "center";
            ctx.fillText(this.number, this.x, this.y + 3);
        }
        update() {
            if (isShaking) {
                this.vx += (Math.random() - 0.5) * 4;
                this.vy += (Math.random() - 0.5) * 4;
            }
            this.x += this.vx;
            this.y += this.vy;
            this.vx *= 0.99; this.vy *= 0.99; // fiksyon

            let dx = this.x - globe.x;
            let dy = this.y - globe.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist + this.radius > globe.radius) {
                let angle = Math.atan2(dy, dx);
                this.x = globe.x + Math.cos(angle) * (globe.radius - this.radius);
                this.y = globe.y + Math.sin(angle) * (globe.radius - this.radius);
                this.vx *= -0.8; this.vy *= -0.8;
            }
        }
    }

    function init() {
        balls = [];
        for (let i = 0; i < 100; i++) balls.push(new Ball(i));
    }

    function startTiraj() {
        const myNums = myNumbersInput.value.trim().split(/\s+/);
        if (myNums.length !== 6) {
            alert("Tanpri chwazi 6 nimewo avan!");
            return;
        }

        btnStart.disabled = true;
        drawnBalls = [];
        txtGenyen.value = "0";
        isShaking = true;
        resultsDiv.innerText = "AP BRASE...";

        // 10 segond brase
        setTimeout(() => {
            isShaking = false;
            // Tiraj 11e, 12e, 13e segond
            tirerBoule(1, 1000);
            tirerBoule(2, 2000);
            tirerBoule(3, 3000);
        }, 10000);
    }

    function tirerBoule(lo, delay) {
        setTimeout(() => {
            let winIdx = Math.floor(Math.random() * balls.length);
            let b = balls[winIdx].number;
            drawnBalls.push(b);
            resultsDiv.innerText = drawnBalls.join(" - ");
            
            if (drawnBalls.length === 3) {
                verifieGenyen();
                btnStart.disabled = false;
            }
        }, delay);
    }

    function verifieGenyen() {
        const bet = parseFloat(txtPeye.value);
        const myNums = myNumbersInput.value.trim().split(/\s+/);
        let total = 0;
        let mesaj = "REZILTA TIRAJA:\n";

        // Konparezon
        if (myNums.includes(drawnBalls[0])) {
            let g = bet * 100; total += g;
            mesaj += "- BRAVO! Ou fè 1ye Lò: " + g + " HTG\n";
        }
        if (myNums.includes(drawnBalls[1])) {
            let g = bet * 50; total += g;
            mesaj += "- BRAVO! Ou fè 2yèm Lò: " + g + " HTG\n";
        }
        if (myNums.includes(drawnBalls[2])) {
            let g = bet * 25; total += g;
            mesaj += "- BRAVO! Ou fè 3yèm Lò: " + g + " HTG\n";
        }

        if (total === 0) mesaj += "Ou pa genyen anyen fwa sa. Eseye ankò!";
        
        txtGenyen.value = total + " HTG";
        alert(mesaj + "\nTOTAL GENYEN: " + total + " HTG");
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.arc(globe.x, globe.y, globe.radius, 0, Math.PI*2);
        ctx.strokeStyle = "#444"; ctx.lineWidth = 5; ctx.stroke();
        balls.forEach(b => { b.update(); b.draw(); });
        requestAnimationFrame(animate);
    }

    btnStart.addEventListener('click', startTiraj);
    init();
    animate();
</script>
</body>
</html>
